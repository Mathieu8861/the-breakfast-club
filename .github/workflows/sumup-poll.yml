name: SumUp Poll → Meta CAPI

# Runs every 5 minutes to poll SumUp for new online payments
# and forward them to Meta Conversion API as Purchase events.
on:
  schedule:
    - cron: '*/5 * * * *' # every 5 minutes
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger SumUp poll endpoint
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          response=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "https://the-breakfast-club-mu.vercel.app/api/sumup-poll" \
            -H "X-Cron-Secret: $CRON_SECRET" \
            -H "Content-Type: application/json")

          http_status=$(echo "$response" | grep -oP 'HTTP_STATUS:\K[0-9]+')
          body=$(echo "$response" | sed 's/HTTP_STATUS:[0-9]*//')

          echo "HTTP Status: $http_status"
          echo "Response body: $body"

          if [ "$http_status" -ne 200 ]; then
            echo "::error::Poll request failed with status $http_status"
            exit 1
          fi
