<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Orange/citrus fruit body -->
  <circle cx="32" cy="34" r="26" fill="#ff7100"/>
  <!-- Inner lighter circle -->
  <circle cx="32" cy="34" r="21" fill="#f8bf7c"/>
  <!-- Citrus segments -->
  <line x1="32" y1="14" x2="32" y2="54" stroke="#ff7100" stroke-width="2" stroke-linecap="round"/>
  <line x1="13" y1="34" x2="51" y2="34" stroke="#ff7100" stroke-width="2" stroke-linecap="round"/>
  <line x1="18.5" y1="20.5" x2="45.5" y2="47.5" stroke="#ff7100" stroke-width="2" stroke-linecap="round"/>
  <line x1="45.5" y1="20.5" x2="18.5" y2="47.5" stroke="#ff7100" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="34" r="4" fill="#ff7100"/>
  <!-- Leaf -->
  <ellipse cx="32" cy="9" rx="7" ry="4" fill="#879d82" transform="rotate(-20 32 9)"/>
  <!-- Small stem -->
  <line x1="32" y1="8" x2="32" y2="13" stroke="#879d82" stroke-width="2.5" stroke-linecap="round"/>
</svg>
